<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — ResQTrack</title>
  <link rel="icon" type="image/png" href="/public/images/favicon.png">
  <link rel="stylesheet" href="/public/css/output.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
</head>
<body class="bg-gray-50 font-sans min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-2xl mx-auto px-4 h-16 flex items-center gap-3">
      <button onclick="goBack()" class="text-gray-400 hover:text-gray-700 transition-colors p-1 -ml-1">
        <i class="fa-solid fa-arrow-left text-lg"></i>
      </button>
      <div class="flex items-center gap-1">
        <span class="text-red-500 font-bold text-xl">ResQ</span><span class="text-gray-800 font-bold text-xl">Track</span>
      </div>
      <span class="text-gray-300">/</span>
      <span class="text-gray-700 font-semibold text-sm">My Profile & Settings</span>
    </div>
  </nav>

  <div class="max-w-2xl mx-auto px-4 py-8 space-y-5">

    <!-- Profile Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col items-center gap-4">
      <!-- Avatar -->
      <div class="relative group cursor-pointer" onclick="document.getElementById('photo-input').click()">
        <div id="avatar-display"
             class="w-24 h-24 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-4xl overflow-hidden ring-4 ring-blue-100 transition-all group-hover:ring-blue-200">
          <span id="avatar-initials"></span>
          <img id="avatar-img" src="" class="w-full h-full object-cover hidden" alt="Profile photo">
        </div>
        <div class="absolute bottom-0 right-0 w-8 h-8 bg-blue-600 hover:bg-blue-700 rounded-full flex items-center justify-center border-2 border-white shadow transition-colors">
          <i class="fa-solid fa-camera text-white text-xs"></i>
        </div>
        <div class="absolute inset-0 rounded-full bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
          <i class="fa-solid fa-pen text-white text-sm"></i>
        </div>
      </div>
      <input type="file" id="photo-input" accept="image/jpeg,image/png,image/gif,image/webp" class="hidden" onchange="uploadPhoto(this)">

      <div class="text-center">
        <p class="text-xl font-bold text-gray-800" id="profile-name">—</p>
        <span id="role-badge" class="inline-block mt-1 px-3 py-0.5 rounded-full text-xs font-semibold capitalize bg-blue-100 text-blue-700">—</span>
        <p class="text-xs text-gray-400 mt-2" id="profile-since">—</p>
      </div>
    </div>

    <!-- Personal Information -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 space-y-4">
      <h2 class="font-semibold text-gray-800 text-base flex items-center gap-2 border-b border-gray-100 pb-3">
        <i class="fa-solid fa-user text-blue-500"></i> Personal Information
      </h2>
      <form id="profile-form" onsubmit="saveProfile(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Full Name</label>
          <input type="text" id="field-name" name="full_name" required autocomplete="name"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Email Address</label>
          <input type="email" id="field-email" disabled autocomplete="email"
            class="w-full border border-gray-100 rounded-xl px-4 py-2.5 text-sm bg-gray-50 text-gray-400 cursor-not-allowed">
          <p class="text-xs text-gray-400 mt-1">Email cannot be changed</p>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Phone Number</label>
          <input type="tel" id="field-phone" name="phone" autocomplete="tel"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            placeholder="e.g. 09xx-xxx-xxxx">
        </div>
        <button type="submit" id="save-btn"
          class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white font-semibold py-2.5 rounded-xl text-sm transition-colors flex items-center justify-center gap-2">
          <i class="fa-solid fa-floppy-disk"></i> Save Changes
        </button>
      </form>
    </div>

    <!-- Change Password -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 space-y-4">
      <h2 class="font-semibold text-gray-800 text-base flex items-center gap-2 border-b border-gray-100 pb-3">
        <i class="fa-solid fa-lock text-orange-500"></i> Change Password
      </h2>
      <form id="password-form" onsubmit="changePassword(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Current Password</label>
          <div class="relative">
            <input type="password" id="field-current-pw" name="current_password" required autocomplete="current-password"
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent transition pr-10">
            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" onclick="togglePw('field-current-pw',this)">
              <i class="fa-solid fa-eye text-xs"></i>
            </button>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">New Password</label>
          <div class="relative">
            <input type="password" id="field-new-pw" name="new_password" required minlength="6" autocomplete="new-password"
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent transition pr-10">
            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" onclick="togglePw('field-new-pw',this)">
              <i class="fa-solid fa-eye text-xs"></i>
            </button>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Confirm New Password</label>
          <div class="relative">
            <input type="password" id="field-confirm-pw" name="confirm_password" required autocomplete="new-password"
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent transition pr-10">
            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" onclick="togglePw('field-confirm-pw',this)">
              <i class="fa-solid fa-eye text-xs"></i>
            </button>
          </div>
        </div>
        <button type="submit" id="pw-btn"
          class="w-full bg-orange-500 hover:bg-orange-600 disabled:bg-orange-300 text-white font-semibold py-2.5 rounded-xl text-sm transition-colors flex items-center justify-center gap-2">
          <i class="fa-solid fa-key"></i> Update Password
        </button>
      </form>
    </div>

    <!-- Danger Zone -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h2 class="font-semibold text-gray-800 text-base flex items-center gap-2 border-b border-gray-100 pb-3 mb-4">
        <i class="fa-solid fa-right-from-bracket text-red-500"></i> Session
      </h2>
      <button onclick="logout()"
        class="w-full border border-red-200 text-red-600 hover:bg-red-50 font-semibold py-2.5 rounded-xl text-sm transition-colors flex items-center justify-center gap-2">
        <i class="fa-solid fa-right-from-bracket"></i> Sign Out
      </button>
    </div>

  </div>

  <script src="/js/shared/auth.js"></script>
  <script src="/js/shared/api.js"></script>
  <script src="/js/shared/profile.js"></script>
</body>
</html>
