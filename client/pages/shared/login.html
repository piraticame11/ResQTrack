<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ResQTrack</title>
  <link rel="icon" type="image/png" href="/public/images/favicon.png">
  <link rel="stylesheet" href="/public/css/output.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <style>
    .card-header-stripe {
      background: white;
      margin: -2rem -2rem 1.5rem -2rem;
      padding: 1.5rem 2rem;
      border-radius: 1rem 1rem 0 0;
      border-bottom: 1.5px solid #bfdbfe;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card-header-stripe img {
      border: 2px solid #bfdbfe;
      border-radius: 1rem;
      padding: 6px;
      background: #eff6ff;
      box-shadow: 0 4px 16px rgba(59,130,246,0.15), 0 1px 4px rgba(59,130,246,0.10);
    }
    .btn-role { background: #3b82f6; color: white; width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.625rem 1rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; border: none; transition: background 0.2s; }
    .btn-role:hover:not(:disabled) { background: #2563eb; }
    .btn-role:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">

      <!-- Header stripe -->
      <div class="card-header-stripe">
        <img src="/public/images/favicon.png" alt="ResQTrack" class="object-contain drop-shadow-lg">
      </div>

      <div class="mb-5 text-center">
        <h2 class="text-base font-bold text-gray-800">Sign in to ResQTrack</h2>
        <p class="text-xs text-gray-400 mt-0.5">Residents, responders, and barangay officials all sign in here — we'll take you to the right place.</p>
      </div>

      <div id="error-msg" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm"></div>

      <form id="login-form" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email address</label>
          <div class="relative">
            <i class="fa-solid fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="email" id="email" required class="input-field pl-9" placeholder="you@example.com">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="password" id="password" required class="input-field pl-9" placeholder="••••••••">
          </div>
        </div>
        <button type="submit" id="login-btn" class="btn-role">
          <i class="fa-solid fa-right-to-bracket"></i>
          <span id="btn-label">Sign In</span>
        </button>
      </form>

      <div class="mt-6 pt-5 border-t border-gray-100 text-center">
        <p class="text-sm text-gray-500">New resident?
          <a href="/pages/shared/register.html" class="text-blue-600 font-medium hover:underline">Create an account</a>
        </p>
        <p class="text-xs text-gray-400 mt-1.5">Responder and official accounts are issued by the barangay.</p>
      </div>
    </div>

    <p class="text-center text-gray-400 text-xs mt-6">ResQTrack · Barangay Manay, Panabo City Emergency Response</p>
  </div>

  <script>
    const REDIRECTS = {
      admin:     '/pages/admin/dashboard.html',
      responder: '/pages/responder/dashboard.html',
      resident:  '/pages/client/home.html',
    };

    // Redirect if already logged in
    const token = localStorage.getItem('accessToken');
    const user  = (() => { try { return JSON.parse(localStorage.getItem('user')); } catch { return null; } })();
    if (token && user) {
      window.location.href = REDIRECTS[user.role] || REDIRECTS.resident;
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn   = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in…';

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Login failed');

        localStorage.setItem('accessToken',  data.accessToken);
        localStorage.setItem('refreshToken', data.refreshToken);
        localStorage.setItem('user',         JSON.stringify(data.user));

        window.location.href = REDIRECTS[data.user.role] || REDIRECTS.resident;
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> <span id="btn-label">Sign In</span>';
      }
    });
  </script>
</body>
</html>
