<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Reports — ResQTrack</title>
  <link rel="icon" type="image/png" href="/public/images/favicon.png">
  <link rel="stylesheet" href="/public/css/output.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
</head>
<body class="bg-gray-50 font-sans min-h-screen">

  <nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-2xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="/pages/client/home.html" class="text-gray-500 hover:text-gray-700 flex items-center gap-2 text-sm">
        <i class="fa-solid fa-arrow-left"></i> Home
      </a>
      <span class="font-semibold text-gray-800">My Reports</span>
      <a href="/pages/client/report-incident.html" class="btn-danger btn-sm text-xs">
        <i class="fa-solid fa-plus mr-1"></i> New Report
      </a>
    </div>
  </nav>

  <div class="max-w-2xl mx-auto px-4 py-6">

    <div id="reports-container" class="space-y-4">
      <div class="text-center py-12 text-gray-400">
        <i class="fa-solid fa-spinner fa-spin text-2xl mb-3"></i>
        <p>Loading your reports…</p>
      </div>
    </div>

  </div>

  <!-- Report Detail Modal -->
  <div id="detail-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="flex items-center justify-between p-5 border-b border-gray-100">
        <h3 class="font-bold text-gray-800" id="modal-ref">Incident Details</h3>
        <button onclick="closeDetailModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button>
      </div>
      <div class="p-5 space-y-3" id="modal-content"></div>
      <div class="p-5 border-t border-gray-100">
        <h4 class="font-semibold text-gray-700 text-sm mb-3">Activity Timeline</h4>
        <div id="modal-timeline" class="space-y-3 max-h-52 overflow-y-auto"></div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/shared/auth.js"></script>
  <script src="/js/shared/api.js"></script>
  <script src="/js/client/my-reports.js"></script>
</body>
</html>
