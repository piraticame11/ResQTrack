<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements — ResQTrack Admin</title>
  <link rel="icon" type="image/png" href="/public/images/favicon.png">
  <link rel="stylesheet" href="/public/css/output.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
</head>
<body class="bg-gray-50 font-sans">
<div class="flex h-screen overflow-hidden">

  <div id="sidebar-backdrop" onclick="closeSidebar()" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden lg:hidden"></div>

  <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 flex-shrink-0 flex flex-col -translate-x-full transition-transform duration-200 ease-in-out lg:static lg:translate-x-0">
    <div class="h-16 flex items-center px-5 border-b border-slate-800">
      <span class="text-red-400 font-bold text-xl">ResQ</span><span class="text-white font-bold text-xl">Track</span>
      <span class="ml-2 text-slate-500 text-xs uppercase tracking-wider">Admin</span>
    </div>
    <nav class="flex-1 py-4 px-3 space-y-0.5 overflow-y-auto">
      <a href="/pages/admin/dashboard.html"    class="nav-item"><i class="fa-solid fa-gauge w-5 text-center"></i> Dashboard</a>
      <a href="/pages/admin/incidents.html"    class="nav-item"><i class="fa-solid fa-triangle-exclamation w-5 text-center"></i> Incidents</a>
      <a href="/pages/admin/users.html"        class="nav-item"><i class="fa-solid fa-users w-5 text-center"></i> Users</a>
      <a href="/pages/admin/logbook.html"      class="nav-item"><i class="fa-solid fa-book w-5 text-center"></i> Logbook</a>
      <a href="/pages/admin/announcements.html" class="nav-item active"><i class="fa-solid fa-bullhorn w-5 text-center"></i> Announcements</a>
      <a href="/pages/admin/reports.html"      class="nav-item"><i class="fa-solid fa-chart-bar w-5 text-center"></i> Reports</a>
    </nav>
    <div class="border-t border-slate-800 p-4">
      <div class="flex items-center gap-3">
        <a href="/pages/shared/profile.html" class="flex items-center gap-3 flex-1 min-w-0 hover:opacity-75 transition-opacity" title="My Profile">
          <div class="w-9 h-9 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-sm shrink-0 overflow-hidden" id="user-avatar">A</div>
          <div class="min-w-0"><p class="text-white text-sm font-medium truncate" id="user-name">Admin</p><p class="text-slate-400 text-xs">Administrator</p></div>
        </a>
        <button onclick="logout()" class="text-slate-400 hover:text-red-400 transition-colors shrink-0"><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
    </div>
  </aside>

  <div class="flex-1 flex flex-col overflow-hidden">
    <header class="h-16 bg-white border-b border-gray-200 px-4 lg:px-6 flex items-center shrink-0">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="lg:hidden text-gray-500 hover:text-gray-700 -ml-1 p-1"><i class="fa-solid fa-bars text-xl"></i></button>
        <h1 class="text-lg font-semibold text-gray-800">Announcements & Contacts</h1>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 lg:p-6">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- Announcement Form -->
        <div class="card lg:col-span-2 h-fit">
          <h2 class="font-semibold text-gray-800 mb-4"><i class="fa-solid fa-pen-to-square mr-2 text-blue-500"></i>Post Announcement</h2>
          <form id="announcement-form" class="space-y-4">
            <input type="hidden" id="edit-ann-id">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Title</label>
              <input type="text" id="ann-title" required class="input-field" placeholder="Announcement title">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Body</label>
              <textarea id="ann-body" required rows="5" class="input-field resize-none" placeholder="Write the announcement content here…"></textarea>
            </div>
            <div class="flex items-center gap-3">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" id="ann-published" class="w-4 h-4 rounded text-blue-600">
                <span class="text-sm text-gray-700">Publish immediately</span>
              </label>
              <button type="submit" id="ann-submit-btn" class="btn-primary ml-auto">
                <i class="fa-solid fa-paper-plane mr-1"></i> Post
              </button>
              <button type="button" id="ann-cancel-btn" onclick="resetAnnForm()" class="btn-secondary hidden">Cancel</button>
            </div>
          </form>
        </div>

        <!-- Emergency Contacts -->
        <div class="card h-fit">
          <div class="flex items-center justify-between mb-4">
            <h2 class="font-semibold text-gray-800"><i class="fa-solid fa-phone-volume mr-2 text-red-500"></i>Emergency Contacts</h2>
            <button onclick="openAddContact()" class="btn-primary btn-sm"><i class="fa-solid fa-plus"></i></button>
          </div>
          <div id="contacts-list" class="space-y-3">
            <p class="text-gray-400 text-sm text-center py-4">Loading…</p>
          </div>
        </div>

      </div>

      <!-- Announcements List -->
      <div class="card mt-6">
        <h2 class="font-semibold text-gray-800 mb-4"><i class="fa-solid fa-list mr-2 text-gray-400"></i>All Announcements</h2>
        <div id="announcements-list" class="space-y-3">
          <p class="text-gray-400 text-sm text-center py-4">Loading announcements…</p>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Edit Contact Modal -->
<div id="contact-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="flex items-center justify-between p-5 border-b">
      <h3 class="font-bold text-gray-800" id="contact-modal-title">Emergency Contact</h3>
      <button onclick="closeContactModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button>
    </div>
    <form id="contact-form" class="p-5 space-y-4">
      <input type="hidden" id="contact-id">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Label</label>
        <input type="text" id="contact-label" required class="input-field" placeholder="e.g. Barangay Hotline">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Phone Number</label>
        <input type="tel" id="contact-phone" required class="input-field" placeholder="082-000-0000">
      </div>
      <button type="submit" class="btn-primary w-full">Save Contact</button>
    </form>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/shared/auth.js"></script>
<script src="/js/shared/api.js"></script>
<script src="/js/admin/notify.js"></script>
<script src="/js/admin/announcements.js"></script>
</body>
</html>
